<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* Smooth Immersive Styling Framework */
        :root {
            --bg-primary: #ffffff;
            --text-primary: #111827;
            --accent-purple: #7d0ae9;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(0, 0, 0, 0.02);
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --text-primary: #f1f5f9;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Glassmorphism Navigation Structure */
        .custom-navbar {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-top: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .nav-link {
            color: var(--text-primary) !important;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav-link:hover {
            opacity: 0.7;
        }

        .brand-logo h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
        }

        /* Theme Light Switcher Widget */
        .theme-btn {
            background: transparent;
            border: none;
            color: var(--accent-purple);
            cursor: pointer;
            padding: 8px;
            font-size: 20px;
            transition: transform 0.2s ease;
        }
        .theme-btn:hover {
            transform: scale(1.1);
        }

        /* Modern Contact Panel Framework */
        .contact-container {
            padding: 40px 0 60px;
        }

        .sub-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 35px;
            position: relative;
            display: inline-block;
        }

        .sub-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 60px;
            height: 4px;
            background: var(--accent-purple);
            border-radius: 2px;
        }

        .contact-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(15px);
        }

        .form-control-custom {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 20px;
            color: var(--text-primary) !important;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control-custom:focus {
            background: transparent;
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(125, 10, 233, 0.15);
        }

        .submit-btn {
            background: var(--accent-purple);
            color: white;
            font-weight: 600;
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.2s;
            cursor: pointer;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Modal Authentication Overlay Components */
        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            color: var(--text-primary);
        }

        .modal-form-group input {
            width: 100%;
            height: 50px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            padding-left: 20px;
            background: transparent;
            color: var(--text-primary);
        }

        .login-btn {
            background: var(--accent-purple);
            color: white;
            border-radius: 25px;
            padding: 10px 30px;
            border: none;
            width: 100%;
            font-weight: 600;
        }

        footer {
            border-top: 1px solid var(--glass-border);
            padding: 20px 0;
            margin-top: 60px;
        }

        .social-link-item i {
            font-size: 24px;
            color: var(--text-primary);
            margin: 0 16px;
            transition: color 0.3s, transform 0.3s;
        }

        .social-link-item i:hover {
            color: var(--accent-purple);
            transform: translateY(-4px);
        }
    </style>
</head>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <script>
        // Synchronized Theme Functional State Toggle Handler
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('.theme-btn i');
            if(document.body.classList.contains('dark-mode')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }
    </script>
